<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>🏠 Artículos de Limpieza "Mamá"</h1>

    <div class="filtros">

        <button onclick="filtrar('lavadero')">Lavadero</button>

        <button onclick="enviarWhatsApp()" style="background: #25d366; color: white;">Finalizar Pedido 💬</button>

    <div id="contenedor-productos" style="display: flex; flex-wrap: wrap; gap: 20px;">
        </div>
